name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin Bun: floating to latest pulled in 1.3.14, which fails to reach the
      # npm registry (ConnectionRefused on every tarball). 1.3.10 is the version
      # the upstream dev-3.0 repo uses and installs cleanly.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      # TEMP diagnostic: prove whether the runner can reach the npm registry /
      # tarball CDN at all (github.com is the control). Never fails the job.
      - name: Diagnostic — npm network reachability
        continue-on-error: true
        run: |
          echo "===== DNS: registry.npmjs.org ====="
          nslookup registry.npmjs.org || true
          echo "===== HEAD https://registry.npmjs.org/ ====="
          curl -sS -I --max-time 20 https://registry.npmjs.org/ || true
          echo "===== HEAD https://npmjs.org ====="
          curl -sS -I --max-time 20 https://npmjs.org || true
          echo "===== GET real tarball (typescript) ====="
          curl -sS -o /dev/null -w 'http_code=%{http_code} time=%{time_total}s size=%{size_download}\n' \
            --max-time 30 https://registry.npmjs.org/typescript/-/typescript-6.0.3.tgz || true
          echo "===== IPv4-only tarball ====="
          curl -4 -sS -o /dev/null -w 'ipv4 http_code=%{http_code} time=%{time_total}s\n' \
            --max-time 30 https://registry.npmjs.org/typescript/-/typescript-6.0.3.tgz || echo "ipv4 FAILED"
          echo "===== IPv6-only tarball ====="
          curl -6 -sS -o /dev/null -w 'ipv6 http_code=%{http_code} time=%{time_total}s\n' \
            --max-time 30 https://registry.npmjs.org/typescript/-/typescript-6.0.3.tgz || echo "ipv6 FAILED"
          echo "===== CONTROL: HEAD https://github.com ====="
          curl -sS -I --max-time 20 https://github.com || true
          echo "===== proxy / npm env ====="
          env | grep -iE 'proxy|npm_|bun' || echo "(none)"

      # Cache node_modules so green runs never touch the registry again. Keyed on
      # the lockfile hash; only a lockfile change forces a fresh install.
      - name: Restore node_modules cache
        id: cache-deps
        uses: actions/cache/restore@v4
        with:
          path: ./node_modules
          key: bun-deps-linux-x64-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          # GitHub-hosted runners have no working IPv6. npm's Cloudflare CDN
          # publishes AAAA records, and bun's installer tries IPv6 first ->
          # ConnectionRefused/FailedToOpenSocket, even though curl (IPv4) works.
          # Pin the registry to its IPv4 address so bun can't attempt IPv6.
          NPM_IP="$(getent ahostsv4 registry.npmjs.org | awk 'NR==1{print $1}')"
          echo "Pinning registry.npmjs.org -> ${NPM_IP} (IPv4)"
          echo "${NPM_IP} registry.npmjs.org" | sudo tee -a /etc/hosts
          bun install --frozen-lockfile

      - name: Save node_modules cache
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./node_modules
          key: bun-deps-linux-x64-${{ hashFiles('bun.lock') }}

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
